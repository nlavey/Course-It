<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSP Course Scheduler</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>CSP Course Scheduler</h1>

<section class="course-form">

    <input
        id="courseName"
        type="text"
        placeholder="Course Name">

    <input
        id="units"
        type="number"
        placeholder="Units">

    <button id="addBtn">
        Add Course
    </button>

</section>

<section>

    <ul id="courseList"></ul>

</section>

<script type="module" src="script.js"></script>

</body>
</html>
